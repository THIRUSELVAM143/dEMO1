<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #4e73df;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #2e59d9;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .footer-text a {
            text-decoration: none;
            color: #4e73df;
        }
    </style>
</head>
<body>
    <h1>mY SUB bRANCH mESSAGE pLEASE merge sub branch Only</h1>
    <h1>Main changes</h1>
    <div class="login-container">
        <h2>Login</h2>
        <form action="/login" method="POST">
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

        </form>

        <div class="footer-text">
            Don't have an account? <a href="#">Register</a>
        </div>
    </div>

</body>
</html>
